auth_enabled: false

server:
  http_listen_port: 3100
  log_format: json
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h  # 30 дней
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 30m
  max_query_parallelism: 32
  max_query_series: 500
  cardinality_limit: 100000
  max_query_lookback: 720h

querier:
  max_concurrent: 20
  query_ingesters_within: 0

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# Ruler section disabled — AlertManager is not deployed in this stack.
# Uncomment and configure when AlertManager is available.
# ruler:
#   alertmanager_url: http://alertmanager:9093

# Включаем метки для лучшего парсинга
analytics:
  reporting_enabled: false