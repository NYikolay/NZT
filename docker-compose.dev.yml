x-app: &default-app
  build:
    context: .
    dockerfile: Dockerfile
    target: "local"

x-env: &env
  env_file:
    - .env


services:
  db:
    <<: *env
    image: postgres:16
    container_name: nzt-postgres-dev
    environment:
      - POSTGRES_DB=${POSTGRES_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGPORT=${POSTGRES_PORT}
    ports:
      - 5433:${POSTGRES_PORT}
    healthcheck:
      test: pg_isready -d ${POSTGRES_NAME} -U ${POSTGRES_USER}
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - nzt_postgres_data:/var/lib/postgresql/data
    networks:
      - nzt-backend-network
  redis:
      image: redis:7-alpine
      container_name: nzt-backend-redis-dev
      volumes:
      - nzt_backend_redis_data:/var/lib/redis/data
      healthcheck:
        test: redis-cli ping
        interval: 1s
        timeout: 3s
        retries: 50
      networks:
        - nzt-backend-network
  app:
    <<: 
     - *env
     - *default-app
    container_name: nzt-backend-dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - nzt-backend-network

volumes:
  nzt_postgres_data:
  nzt_backend_redis_data:

networks:
  nzt-backend-network: