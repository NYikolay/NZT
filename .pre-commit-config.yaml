repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && PRE_COMMIT=1 scripts/run-tests.sh'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
